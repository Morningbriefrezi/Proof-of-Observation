<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#070B14" rx="20"/>
  <!-- Planet body -->
  <circle cx="100" cy="88" r="38" fill="#1A1F2E"/>
  <circle cx="100" cy="88" r="38" fill="url(#planetGrad)"/>
  <!-- Saturn ring (ellipse behind) -->
  <ellipse cx="100" cy="90" rx="62" ry="14" fill="none" stroke="url(#ringGrad)" stroke-width="8" opacity="0.6"/>
  <!-- Planet surface bands -->
  <ellipse cx="100" cy="82" rx="30" ry="6" fill="rgba(139,92,246,0.15)"/>
  <ellipse cx="100" cy="94" rx="30" ry="4" fill="rgba(20,184,166,0.12)"/>
  <!-- Ring front (clip over planet bottom) -->
  <ellipse cx="100" cy="90" rx="62" ry="14" fill="none" stroke="url(#ringGrad)" stroke-width="8" opacity="0.85" stroke-dasharray="195 197" stroke-dashoffset="-1"/>
  <!-- Glow -->
  <circle cx="100" cy="88" r="50" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="12"/>
  <!-- Stars -->
  <circle cx="28" cy="22" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="170" cy="35" r="1" fill="white" opacity="0.6"/>
  <circle cx="55" cy="168" r="1.3" fill="white" opacity="0.5"/>
  <circle cx="148" cy="160" r="1" fill="white" opacity="0.6"/>
  <circle cx="185" cy="90" r="1.1" fill="white" opacity="0.5"/>
  <circle cx="15" cy="110" r="0.9" fill="white" opacity="0.4"/>
  <!-- STELLARR text -->
  <text x="100" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" letter-spacing="4" fill="white" opacity="0.95">STELLARR</text>
  <defs>
    <radialGradient id="planetGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#4C3A8C"/>
      <stop offset="50%" stop-color="#1A1F2E"/>
      <stop offset="100%" stop-color="#0D1025"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#14B8A6" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
</svg>
